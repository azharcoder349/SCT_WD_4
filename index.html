<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="container">

        <header>
            <h1>
                <i class="fas fa-check-circle"></i>
                Advanced To-Do App
            </h1>

            <button id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="dashboard">

            <div class="card">
                <h3>Total Tasks</h3>
                <span id="totalTasks">0</span>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <span id="completedTasks">0</span>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <span id="pendingTasks">0</span>
            </div>

        </div>

        <div class="progress-section">

            <div class="progress-info">
                <h3>Progress</h3>
                <span id="progressPercent">0%</span>
            </div>

            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>

        </div>

        <div class="task-form">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter Task..."
            >

            <input
                type="date"
                id="taskDate"
            >

            <input
                type="time"
                id="taskTime"
            >

            <select id="priority">
                <option value="High">
                    High Priority
                </option>

                <option value="Medium">
                    Medium Priority
                </option>

                <option value="Low">
                    Low Priority
                </option>
            </select>

            <button id="addTaskBtn">
                <i class="fas fa-plus"></i>
                Add Task
            </button>

        </div>

        <div class="controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Tasks..."
            >

            <div class="filters">

                <button
                    data-filter="all"
                    class="active"
                >
                    All
                </button>

                <button
                    data-filter="pending"
                >
                    Pending
                </button>

                <button
                    data-filter="completed"
                >
                    Completed
                </button>

            </div>

        </div>

        <div class="task-container">

            <ul id="taskList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
